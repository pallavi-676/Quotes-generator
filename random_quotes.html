<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quote of the Day</title>
    <meta name="description" content="A beautiful and simple random quote generator.">
    <!-- Google Fonts for typography -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@300;400;600&display=swap"
        rel="stylesheet">
    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="quote-card">
            <div class="quote-content">
                <div class="quote-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512" width="24" height="24"
                        fill="currentColor">
                        <path
                            d="M0 216C0 149.7 53.7 96 120 96l8 0c17.7 0 32 14.3 32 32s-14.3 32-32 32l-8 0c-30.9 0-56 25.1-56 56l0 8 64 0c35.3 0 64 28.7 64 64l0 64c0 35.3-28.7 64-64 64l-64 0c-35.3 0-64-28.7-64-64l0-136zm320 0c0-66.3 53.7-120 120-120l8 0c17.7 0 32 14.3 32 32s-14.3 32-32 32l-8 0c-30.9 0-56 25.1-56 56l0 8 64 0c35.3 0 64 28.7 64 64l0 64c0 35.3-28.7 64-64 64l-64 0c-35.3 0-64-28.7-64-64l0-136z" />
                    </svg>
                </div>
                <!-- Dynamic Quote Text -->
                <p id="quote-text">Life is what happens when you're busy making other plans.</p>
                <!-- Dynamic Quote Author -->
                <h3 id="quote-author">- John Lennon</h3>
            </div>
            <div class="card-footer">
                <button id="generate-btn" class="generate-btn">
                    <span>New Quote</span>
                </button>
            </div>
        </div>
    </div>

    <!-- External JS Script -->
    <script src="script.js"></script>
</body>

</html>
